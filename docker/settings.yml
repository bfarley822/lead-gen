use_default_settings: true

general:
  instance_name: "lead-gen-searxng"
  debug: false

server:
  secret_key: "lead-gen-local-dev-secret-key"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

redis:
  url: "redis://valkey:6379/0"

engines:
  - name: google
    engine: google
    shortcut: go
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false
